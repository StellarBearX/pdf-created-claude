<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CYBER_PDF // AI_AUGMENTED_COMPILER</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&display=swap');

        :root {
            --neon-cyan: #00ffcc;
            --neon-cyan-dim: rgba(0, 255, 204, 0.2);
            --neon-cyan-glow: rgba(0, 255, 204, 0.4);
            --neon-magenta: #ff00ff;
            --bg-deep: #050a0e;
            --bg-panel: #0a1a1e;
            --bg-black: #030709;
            --acid-green: #aaff00;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: var(--bg-deep);
            color: var(--neon-cyan);
            font-family: 'JetBrains Mono', monospace;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
        }

        .scanline {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0, 255, 204, 0.015) 2px, rgba(0, 255, 204, 0.015) 4px);
            pointer-events: none;
            z-index: 1000;
        }

        .app-shell {
            flex: 1;
            display: grid;
            grid-template-columns: 380px 1fr;
            padding: 15px;
            gap: 15px;
            height: 100vh;
            background: radial-gradient(circle at 50% 50%, #0a1a1e 0%, #050a0e 100%);
        }

        /* SIDEBAR */
        .sidebar {
            background: rgba(10, 26, 30, 0.8);
            border: 1px solid var(--neon-cyan-dim);
            backdrop-filter: blur(10px);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            position: relative;
            clip-path: polygon(0 0, 100% 0, 100% calc(100% - 20px), calc(100% - 20px) 100%, 0 100%);
        }

        .sidebar-header {
            padding: 25px;
            border-bottom: 1px solid var(--neon-cyan-dim);
            background: rgba(0, 255, 204, 0.03);
        }

        .brand-title {
            font-size: 22px;
            font-weight: 800;
            letter-spacing: 4px;
            color: var(--neon-cyan);
            text-shadow: 0 0 15px var(--neon-cyan-glow);
        }

        .config-block {
            padding: 20px 25px;
            border-bottom: 1px solid rgba(0, 255, 204, 0.05);
        }

        .config-label {
            font-size: 10px;
            letter-spacing: 2px;
            color: var(--neon-cyan-dim);
            text-transform: uppercase;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .config-label::after {
            content: '';
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, var(--neon-cyan-dim), transparent);
        }

        .preset-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .btn-cyber {
            background: #030709;
            border: 1px solid var(--neon-cyan-dim);
            color: var(--neon-cyan-dim);
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            padding: 12px;
            cursor: pointer;
            transition: all 0.2s;
            text-align: left;
            position: relative;
            clip-path: polygon(0 0, calc(100% - 10px) 0, 100% 10px, 100% 100%, 0 100%);
        }

        .btn-cyber.active {
            background: var(--neon-cyan-dim);
            border-color: var(--neon-cyan);
            color: var(--neon-cyan);
            box-shadow: inset 0 0 10px rgba(0, 255, 204, 0.2);
        }

        .btn-cyber:hover:not(.active) {
            border-color: var(--neon-cyan-glow);
            color: var(--neon-cyan);
            background: rgba(0, 255, 204, 0.05);
        }

        .cyber-input {
            width: 100%;
            background: #030709;
            border: 1px solid var(--neon-cyan-dim);
            color: var(--neon-cyan);
            padding: 10px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            outline: none;
            transition: all 0.2s;
        }

        .cyber-input:focus {
            border-color: var(--neon-cyan);
            box-shadow: 0 0 10px var(--neon-cyan-dim);
        }

        /* AI CORE STYLING */
        .ai-core {
            border: 1px solid var(--neon-magenta);
            margin: 10px;
            padding: 15px;
            background: rgba(255, 0, 255, 0.02);
            position: relative;
        }

        .ai-label {
            color: var(--neon-magenta);
            font-size: 10px;
            letter-spacing: 2px;
            margin-bottom: 10px;
            display: block;
        }

        .ai-input {
            border-color: rgba(255, 0, 255, 0.3);
            color: var(--neon-magenta);
        }

        .ai-input:focus {
            border-color: var(--neon-magenta);
            box-shadow: 0 0 10px rgba(255, 0, 255, 0.2);
        }

        /* MAIN CONTENT */
        .main-stage {
            display: flex;
            flex-direction: column;
            gap: 15px;
            overflow: hidden;
        }

        .drop-area {
            flex: 1;
            border: 2px dashed var(--neon-cyan-dim);
            background: rgba(0, 255, 204, 0.01);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            cursor: pointer;
            transition: 0.3s;
        }

        .drop-area:hover {
            background: rgba(0, 255, 204, 0.05);
            border-color: var(--neon-cyan);
        }

        .image-manager {
            width: 100%;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
            padding: 10px;
            overflow-y: auto;
            flex: 1;
            display: none;
        }

        .asset-card {
            background: var(--bg-panel);
            border: 1px solid var(--neon-cyan-dim);
            aspect-ratio: 1/1.2;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .asset-preview {
            flex: 1;
            overflow: hidden;
            position: relative;
            background: #000;
        }

        .asset-preview img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .asset-info {
            padding: 8px;
            background: #030709;
            font-size: 9px;
            border-top: 1px solid var(--neon-cyan-dim);
        }

        .ai-tag {
            color: var(--neon-magenta);
            margin-top: 4px;
            font-style: italic;
            height: 24px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .btn-remove {
            position: absolute;
            top: 5px;
            right: 5px;
            background: rgba(255, 0, 0, 0.2);
            border: 1px solid red;
            color: red;
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 10;
        }

        /* ACTION BAR */
        .action-bar {
            background: #030709;
            border: 1px solid var(--neon-cyan-dim);
            padding: 15px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .btn-compile {
            background: transparent;
            border: 1px solid var(--neon-cyan);
            color: var(--neon-cyan);
            padding: 14px 40px;
            font-family: 'JetBrains Mono', monospace;
            font-weight: 700;
            letter-spacing: 3px;
            cursor: pointer;
            clip-path: polygon(0 0, calc(100% - 15px) 0, 100% 15px, 100% 100%, 15px 100%, 0 calc(100% - 15px));
        }

        .btn-compile:hover:not(:disabled) {
            background: var(--neon-cyan);
            color: var(--bg-black);
            box-shadow: 0 0 30px var(--neon-cyan-glow);
        }

        .btn-compile:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .ai-status-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 10px;
            color: var(--neon-magenta);
        }

        .pulse-magenta {
            width: 8px;
            height: 8px;
            background: var(--neon-magenta);
            border-radius: 50%;
            box-shadow: 0 0 8px var(--neon-magenta);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        #file-input { display: none; }
    </style>
</head>
<body>
    <div class="scanline"></div>

    <div class="app-shell">
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="brand-title">CYBER_PDF</div>
                <div style="font-size: 9px; color: var(--neon-cyan-dim); letter-spacing: 2px;">AI_AUGMENTED_SYSTEM // V3.0</div>
            </div>

            <div class="ai-core">
                <span class="ai-label">[ CLAUDE_API_KEY ]</span>
                <input type="password" id="api-key" class="cyber-input ai-input" placeholder="sk-ant-...">
                <div style="margin-top: 10px; display: flex; align-items: center; gap: 8px;">
                    <input type="checkbox" id="ai-enable">
                    <label for="ai-enable" style="font-size: 9px; color: var(--neon-magenta); cursor: pointer;">ENABLE_AI_METADATA</label>
                </div>
            </div>

            <div class="config-block">
                <div class="config-label">PAGE_FORMAT</div>
                <div class="preset-grid">
                    <button class="btn-cyber active" onclick="setFormat('A4', 210, 297, this)">A4<span style="display:block;font-size:8px;opacity:0.5;">210x297mm</span></button>
                    <button class="btn-cyber" onclick="setFormat('A3', 297, 420, this)">A3<span style="display:block;font-size:8px;opacity:0.5;">297x420mm</span></button>
                    <button class="btn-cyber" onclick="setFormat('LTR', 216, 279, this)">LETTER<span style="display:block;font-size:8px;opacity:0.5;">216x279mm</span></button>
                    <button class="btn-cyber" onclick="setFormat('CUSTOM', 0, 0, this)">CUSTOM</button>
                </div>
            </div>

            <div class="config-block">
                <div class="config-label">ORIENTATION</div>
                <div class="preset-grid">
                    <button class="btn-cyber active" id="port-btn" onclick="setOrient('portrait')">PORTRAIT</button>
                    <button class="btn-cyber" id="land-btn" onclick="setOrient('landscape')">LANDSCAPE</button>
                </div>
            </div>

            <div class="config-block" id="custom-dims" style="display:none;">
                <div class="config-label">DIMENSIONS_MM</div>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                    <input type="number" id="w-in" class="cyber-input" value="210" oninput="updateCustom()">
                    <input type="number" id="h-in" class="cyber-input" value="297" oninput="updateCustom()">
                </div>
            </div>

            <div class="config-block" style="flex:1; border-bottom:0; display:flex; flex-direction:column; justify-content:center; align-items:center;">
                <div style="width:100%; height:150px; background:#030709; border:1px solid rgba(0,255,204,0.1); position:relative; display:flex; align-items:center; justify-content:center;">
                    <svg id="paper-svg" viewBox="0 0 100 130" width="80" height="110">
                        <rect id="paper-rect" x="5" y="5" width="90" height="120" fill="rgba(0, 255, 204, 0.05)" stroke="var(--neon-cyan)" stroke-width="1.5" />
                        <line x1="15" y1="20" x2="85" y2="20" stroke="rgba(0, 255, 204, 0.2)" stroke-width="1" />
                    </svg>
                    <div id="dim-label" style="position:absolute; bottom:5px; right:5px; font-size:8px; color:var(--neon-cyan-dim);">210x297mm</div>
                </div>
            </div>
        </aside>

        <main class="main-stage">
            <div id="drop-zone" class="drop-area" onclick="document.getElementById('file-input').click()">
                <div style="text-align:center;">
                    <div style="font-size:48px; margin-bottom:10px;">⇪</div>
                    <div style="font-size:16px; letter-spacing:4px; font-weight:700;">DEPLOY_IMAGE_RESOURCES</div>
                    <div style="font-size:9px; color:var(--neon-cyan-dim); margin-top:10px;">AWAITING_DATA_INPUT...</div>
                </div>
            </div>

            <div id="manager" class="image-manager">
                <!-- Assets here -->
            </div>

            <footer class="action-bar">
                <div style="display:flex; gap:30px; font-size:10px; color:var(--neon-cyan-dim);">
                    <div>STATUS: <b id="sys-status" style="color:var(--neon-cyan);">IDLE</b></div>
                    <div>ASSETS: <b id="asset-count" style="color:var(--neon-cyan);">0</b></div>
                    <div id="ai-indicator" style="display:none;" class="ai-status-indicator">
                        <div class="pulse-magenta"></div>
                        AI_ACTIVE
                    </div>
                </div>
                <div style="display:flex; gap:15px; align-items:center;">
                    <button class="btn-cyber" style="border-color:red; color:red;" onclick="clearAll()">WIPE</button>
                    <button id="btn-run" class="btn-compile" disabled onclick="compile()">COMPILE_TO_PDF</button>
                </div>
            </footer>
        </main>
    </div>

    <input type="file" id="file-input" multiple accept="image/*">

    <script>
        const { jsPDF } = window.jspdf;
        let assets = [];
        let state = { fmt: 'A4', w: 210, h: 297, orient: 'portrait', ai: false };

        function updateUI() {
            const hasAssets = assets.length > 0;
            document.getElementById('drop-zone').style.display = hasAssets ? 'none' : 'flex';
            document.getElementById('manager').style.display = hasAssets ? 'grid' : 'none';
            document.getElementById('btn-run').disabled = !hasAssets;
            document.getElementById('asset-count').textContent = assets.length;
            document.getElementById('ai-indicator').style.display = document.getElementById('ai-enable').checked ? 'flex' : 'none';
            renderAssets();
            drawPreview();
        }

        function drawPreview() {
            const rect = document.getElementById('paper-rect');
            let w = state.orient === 'landscape' ? state.h : state.w;
            let h = state.orient === 'landscape' ? state.w : state.h;
            const ratio = w/h;
            if (ratio > 0.76) {
                rect.setAttribute('width', 90); rect.setAttribute('height', 90/ratio);
                rect.setAttribute('x', 5); rect.setAttribute('y', (130 - (90/ratio))/2);
            } else {
                rect.setAttribute('height', 120); rect.setAttribute('width', 120*ratio);
                rect.setAttribute('y', 5); rect.setAttribute('x', (100 - (120*ratio))/2);
            }
            document.getElementById('dim-label').textContent = `${w}x${h}mm`;
        }

        function setFormat(n, w, h, btn) {
            state.fmt = n; state.w = w; state.h = h;
            document.querySelectorAll('.preset-grid .btn-cyber').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById('custom-dims').style.display = n === 'CUSTOM' ? 'block' : 'none';
            if(n === 'CUSTOM') { state.w = 210; state.h = 297; }
            updateUI();
        }

        function setOrient(o) {
            state.orient = o;
            document.getElementById('port-btn').classList.toggle('active', o === 'portrait');
            document.getElementById('land-btn').classList.toggle('active', o === 'landscape');
            updateUI();
        }

        function updateCustom() {
            state.w = parseInt(document.getElementById('w-in').value) || 210;
            state.h = parseInt(document.getElementById('h-in').value) || 297;
            updateUI();
        }

        function handleFiles(files) {
            Array.from(files).forEach(f => {
                if (!f.type.startsWith('image/')) return;
                const r = new FileReader();
                r.onload = async (e) => {
                    const asset = { src: e.target.result, name: f.name, id: Math.random(), aiText: '' };
                    assets.push(asset);
                    updateUI();
                    if(document.getElementById('ai-enable').checked) {
                        processAI(asset);
                    }
                };
                r.readAsDataURL(f);
            });
        }

        async function processAI(asset) {
            const key = document.getElementById('api-key').value;
            if(!key) return;
            
            setStatus('AI_ANALYZING...');
            try {
                const base64Image = asset.src.split(',')[1];
                const response = await fetch('https://api.anthropic.com/v1/messages', {
                    method: 'POST',
                    headers: {
                        'x-api-key': key,
                        'anthropic-version': '2023-06-01',
                        'content-type': 'application/json',
                        'dangerously-allow-ut8-decode-in-headers': 'true'
                    },
                    body: JSON.stringify({
                        model: "claude-3-haiku-20240307",
                        max_tokens: 100,
                        messages: [{
                            role: "user",
                            content: [
                                { type: "image", source: { type: "base64", media_type: "image/jpeg", data: base64Image } },
                                { type: "text", text: "Give me a short futuristic/cyberpunk style description (max 10 words) for this image. Output only the description." }
                            ]
                        }]
                    })
                });
                const data = await response.json();
                asset.aiText = data.content[0].text;
                updateUI();
            } catch (err) {
                console.error(err);
                asset.aiText = "AI_LINK_ERROR";
                updateUI();
            }
            setStatus('IDLE');
        }

        function renderAssets() {
            const man = document.getElementById('manager');
            man.innerHTML = '';
            assets.forEach((a, i) => {
                const card = document.createElement('div');
                card.className = 'asset-card';
                card.innerHTML = `
                    <div class="btn-remove" onclick="removeAsset(${i})">×</div>
                    <div class="asset-preview"><img src="${a.src}"></div>
                    <div class="asset-info">
                        <div style="white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${a.name}</div>
                        <div class="ai-tag">${a.aiText || (document.getElementById('ai-enable').checked ? 'PENDING_AI...' : 'NO_AI')}</div>
                    </div>
                `;
                man.appendChild(card);
            });
        }

        function removeAsset(i) { assets.splice(i, 1); updateUI(); }
        function clearAll() { assets = []; updateUI(); }
        function setStatus(s) { document.getElementById('sys-status').textContent = s; }

        document.getElementById('file-input').addEventListener('change', (e) => handleFiles(e.target.files));
        const dz = document.getElementById('drop-zone');
        dz.addEventListener('dragover', (e) => { e.preventDefault(); dz.style.background = 'rgba(0,255,204,0.1)'; });
        dz.addEventListener('dragleave', () => { dz.style.background = 'transparent'; });
        dz.addEventListener('drop', (e) => { e.preventDefault(); handleFiles(e.dataTransfer.files); });

        async function compile() {
            setStatus('COMPILING...');
            const doc = new jsPDF({
                orientation: state.orient,
                unit: 'mm',
                format: state.fmt === 'CUSTOM' ? [state.w, state.h] : state.fmt
            });
            const pw = doc.internal.pageSize.getWidth();
            const ph = doc.internal.pageSize.getHeight();

            for (let i = 0; i < assets.length; i++) {
                if (i > 0) doc.addPage(state.fmt === 'CUSTOM' ? [state.w, state.h] : state.fmt, state.orient);
                const img = assets[i];
                
                // Drawing image
                doc.addImage(img.src, 'JPEG', 0, 0, pw, ph, undefined, 'FAST');
                
                // AI Overlay if enabled
                if (img.aiText) {
                    doc.setFillColor(0, 0, 0, 0.6);
                    doc.rect(5, ph - 15, pw - 10, 10, 'F');
                    doc.setTextColor(0, 255, 204);
                    doc.setFontSize(8);
                    doc.text(`[ AI_RECON: ${img.aiText.toUpperCase()} ]`, 10, ph - 8);
                }
                
                // Footer
                doc.setTextColor(0, 255, 204);
                doc.setFontSize(6);
                doc.text(`CYBER_PDF_SYS // PAGE_${i+1}_OF_${assets.length}`, pw - 40, ph - 3);
            }
            doc.save(`CYBER_PDF_${Date.now()}.pdf`);
            setStatus('SUCCESS');
        }

        document.getElementById('ai-enable').addEventListener('change', () => {
            if(document.getElementById('ai-enable').checked) {
                assets.forEach(a => { if(!a.aiText) processAI(a); });
            }
            updateUI();
        });
    </script>
</body>
</html>
